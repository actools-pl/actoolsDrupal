networks:
  actools_actools_net:
    external: true

volumes:
  grafana_data:
  prometheus_data:

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: actools_prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - actools_actools_net

  grafana:
    image: grafana/grafana:latest
    container_name: actools_grafana
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "actools_grafana"
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - actools_actools_net

  node_exporter:
    image: prom/node-exporter:latest
    container_name: actools_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - actools_actools_net

  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: actools_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://actools_redis:6379"
    networks:
      - actools_actools_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: actools_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - actools_actools_net
