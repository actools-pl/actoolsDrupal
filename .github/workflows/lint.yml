name: Lint and Test

on: [push, pull_request]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/core/validate_test.bats tests/core/secrets_test.bats

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck --exclude=SC2034,SC2015,SC2164 core/*.sh
          shellcheck --exclude=SC2034,SC2015,SC2164 modules/host/*.sh
          shellcheck --exclude=SC2034,SC2015,SC2164 modules/db/*.sh
          shellcheck --exclude=SC2034,SC2015,SC2164 modules/preflight/*.sh
          shellcheck --exclude=SC2034,SC2015,SC2164,SC1091,SC2043,SC2046 cron/*.sh
          shellcheck --exclude=SC2034,SC2015,SC2164,SC2043,SC2012,SC1090,SC1091 cli/commands/*.sh
