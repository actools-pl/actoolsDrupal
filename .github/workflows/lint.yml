name: Lint and Test

on: [push, pull_request]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/core/validate_test.bats tests/core/secrets_test.bats

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck core/*.sh
          shellcheck modules/host/*.sh
          shellcheck modules/db/*.sh
          shellcheck modules/preflight/*.sh
          shellcheck cron/*.sh
          shellcheck cli/commands/*.sh
