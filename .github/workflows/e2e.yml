name: E2E Fresh Install

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fresh-install:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install hcloud CLI
        run: |
          curl -fsSL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz \
            | tar xz hcloud
          sudo mv hcloud /usr/local/bin/hcloud
          hcloud version

      - name: Create SSH key
        run: |
          ssh-keygen -t ed25519 -f /tmp/ci_key -N ""
          hcloud ssh-key create --name "ci-key-${{ github.run_id }}" \
            --public-key-from-file /tmp/ci_key.pub
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: Provision server
        id: server
        run: |
          SERVER_NAME="actools-e2e-${{ github.run_id }}"
          SERVER_ID=$(hcloud server create \
            --name "$SERVER_NAME" \
            --type cpx22 \
            --image ubuntu-24.04 \
            --ssh-key "ci-key-${{ github.run_id }}" \
            --location nbg1 \
            --output json | jq -r '.server.id')
          echo "server_id=$SERVER_ID" >> $GITHUB_OUTPUT
          echo "server_name=$SERVER_NAME" >> $GITHUB_OUTPUT
          # Wait for IP to be assigned
          for i in $(seq 1 12); do
            IP=$(hcloud server describe "$SERVER_ID" --output json | jq -r '.public_net.ipv4.ip')
            [[ -n "$IP" && "$IP" != "null" ]] && break
            echo "Waiting for IP... attempt $i"
            sleep 5
          done
          [[ -z "$IP" || "$IP" == "null" ]] && echo "ERROR: IP never assigned" && exit 1
          echo "server_ip=$IP" >> $GITHUB_OUTPUT
          echo "Server: $SERVER_NAME ($IP)"
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: Wait for SSH
        run: |
          IP="${{ steps.server.outputs.server_ip }}"
          echo "Waiting for SSH on $IP..."
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /tmp/ci_key root@"$IP" "echo ok" 2>/dev/null && break
            sleep 10
          done

      - name: Deploy and install
        run: |
          IP="${{ steps.server.outputs.server_ip }}"
          SSH="ssh -o StrictHostKeyChecking=no -i /tmp/ci_key root@$IP"

          # Copy repo
          rsync -az --exclude='.git' -e "ssh -o StrictHostKeyChecking=no -i /tmp/ci_key" \
            ./ root@$IP:/root/actoolsDrupal/

          # Create env file
          $SSH "printf 'BASE_DOMAIN=e2e-${{ github.run_id }}.example.com\nEMAIL=ci@example.com\nDRUPAL_VERSION=11\nPHP_VERSION=8.3\nDB_ROOT_PASS=CiTestPass123\nDRUPAL_ADMIN_PASS=CiAdmin123\nDRUPAL_ADMIN_USER=admin\nDRUPAL_ADMIN_EMAIL=admin@example.com\nENABLE_S3_STORAGE=false\nMARIADB_VERSION=11.4\nENVIRONMENT_MODE=production-isolated\nENABLE_REDIS=true\nREDIS_MEM=256mb\nWORKER_MEMORY_LIMIT=2g\nPHP_MEMORY_LIMIT=512m\nDB_MEMORY_LIMIT=2g\n' > /root/actoolsDrupal/actools.env"

          # Run installer
          $SSH -t "cd /root/actoolsDrupal && sudo DEBIAN_FRONTEND=noninteractive ./actools.sh fresh" 2>&1 | tee install.log

      - name: Run audit
        run: |
          IP="${{ steps.server.outputs.server_ip }}"
          SSH="ssh -o StrictHostKeyChecking=no -i /tmp/ci_key root@$IP"
          AUDIT=$($SSH "/usr/local/bin/actools audit 2>&1" || echo "audit failed")
          echo "$AUDIT"
          PASS=$(echo "$AUDIT" | grep -c "  PASS")
          CRITICAL=$(echo "$AUDIT" | grep -c "CRITICAL")
          echo "PASS count: $PASS"
          echo "CRITICAL count: $CRITICAL"
          if [[ "$PASS" -lt 15 ]] || [[ "$CRITICAL" -gt 0 ]]; then
            echo "FAIL: Too few passes ($PASS) or CRITICAL failures ($CRITICAL)"
            exit 1
          fi
          echo "PASS: CI audit check passed — $PASS checks green, 0 CRITICAL"
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-logs-${{ github.run_id }}
          path: install.log

      - name: Cleanup server
        if: always()
        run: |
          hcloud server delete "${{ steps.server.outputs.server_id }}" || true
          hcloud ssh-key delete "ci-key-${{ github.run_id }}" || true
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
